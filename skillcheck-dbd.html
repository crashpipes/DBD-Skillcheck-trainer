<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBD Skill Check Trainer</title>
<style>
  :root{ --accent:#c9b27a; --txt:#e8e8ea; --muted:#8a8a92; --line:#2a2a30;
         --great:#fff; --good:#b9c4cf; --fail:#c0392b; --green:#3fb950; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(circle at 50% 35%,#141418,#050506 70%);
    color:var(--txt);font-family:"Trebuchet MS",system-ui,Segoe UI,sans-serif;
    display:flex;flex-direction:column;align-items:center;min-height:100%;
    user-select:none;overflow-x:hidden;
  }
  h1{font-size:19px;letter-spacing:3px;text-transform:uppercase;margin:20px 0 2px;color:var(--accent);font-weight:700}
  .sub{color:var(--muted);font-size:12px;letter-spacing:1px;margin-bottom:14px}
  #cv{touch-action:manipulation;cursor:pointer}
  #verdict{height:28px;font-size:19px;letter-spacing:2px;text-transform:uppercase;font-weight:700;transition:opacity .15s;opacity:0;margin-top:8px}
  .v-great{color:#fff;text-shadow:0 0 14px #fff}
  .v-good{color:var(--good)} .v-fail{color:var(--fail)}
  .hint{color:var(--muted);font-size:13px;margin-top:6px}
  .hint b{color:var(--txt);background:#222;border:1px solid var(--line);border-radius:5px;padding:1px 8px}
  .btnrow{display:flex;gap:8px;margin-top:14px;width:330px}
  button{flex:1;background:#1d1d22;border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:10px;cursor:pointer;font-size:12px;letter-spacing:1px;text-transform:uppercase;transition:.15s}
  button:hover{border-color:var(--accent);color:var(--accent)}
  button.start{background:var(--accent);color:#111;border-color:var(--accent);font-weight:700}
  #mute{flex:0 0 46px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:22px;width:330px}
  .stat{background:#141417;border:1px solid var(--line);border-radius:8px;padding:10px 4px;text-align:center}
  .stat .n{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .stat .l{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .stat.great .n{color:#fff} .stat.fail .n{color:var(--fail)}
  .stat.pct .n{color:var(--accent)} .stat.streak .n{color:var(--green)}
  .volrow{display:flex;align-items:center;gap:10px;width:330px;margin-top:10px}
  .volrow .vol-ic{font-size:15px}
  .volrow input[type=range]{flex:1;accent-color:var(--accent)}
  .volrow #volVal{font-size:12px;color:var(--accent);font-variant-numeric:tabular-nums;width:38px;text-align:right}
  .foot{color:#55555c;font-size:11px;margin:24px 0;text-align:center;max-width:380px;line-height:1.5}
</style>
</head>
<body>
  <h1>Skill Check Trainer</h1>
  <div class="sub">Dead by Daylight — Base skill check</div>

  <canvas id="cv" width="320" height="320"></canvas>
  <div id="verdict"></div>
  <div class="hint">Press <b id="keyHint">Space</b> (or click) inside the zone</div>

  <div class="btnrow">
    <button class="start" id="startBtn">▶ Start</button>
    <button id="resetBtn">⟲ Reset</button>
    <button id="mute" title="Mute">🔊</button>
  </div>
  <div class="btnrow" style="margin-top:8px">
    <button id="rebind">⌨ Key: <b id="keyLabel" style="color:var(--accent)">Space</b></button>
  </div>
  <div class="volrow">
    <span class="vol-ic">🔉</span>
    <input type="range" id="vol" min="0" max="100" value="40">
    <span id="volVal">40%</span>
  </div>

  <div class="stats">
    <div class="stat great"><div class="n" id="sGreat">0</div><div class="l">Greats</div></div>
    <div class="stat"><div class="n" id="sGood">0</div><div class="l">Goods</div></div>
    <div class="stat fail"><div class="n" id="sMiss">0</div><div class="l">Misses</div></div>
    <div class="stat pct"><div class="n" id="sPct">—</div><div class="l">Great %</div></div>
    <div class="stat streak"><div class="n" id="sStreak">0</div><div class="l">Great streak</div></div>
    <div class="stat streak"><div class="n" id="sBest">0</div><div class="l">Best</div></div>
  </div>

  <div class="foot">Standard generator / heal skill check, no perks. Checks repeat automatically.</div>

<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const DPR=window.devicePixelRatio||1, SIZE=320;
cv.width=SIZE*DPR; cv.height=SIZE*DPR; cv.style.width=SIZE+'px'; cv.style.height=SIZE+'px';
ctx.scale(DPR,DPR);
const C=SIZE/2, R=120;

// ---- FIXED values of the base DBD skill check (no perks) ----
const PERIOD=1.05;   // seconds per full rotation — measured from gameplay video (~343 deg/s)
const GOOD=46;       // Good zone width (degrees)
const GREAT=11;      // Great zone width at leading edge (degrees)

// ---- Sound ----
let AC=null, muted=false;
function ac(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function tone(freq,t0,dur,type,vol){
  const a=ac(), o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(a.destination);
  const t=a.currentTime+t0;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.03);
}

};
let masterVol=0.4;                 // 0..1, controlled by the Volume slider
const VOL={great:1.0,fail:0.85,appear:0.85}; // relative weights between sounds
const audio={};
for(const k in SND){ audio[k]=new Audio(SND[k]); audio[k].preload='auto'; }
function play(k){ if(muted||masterVol<=0)return; const a=audio[k].cloneNode(); a.volume=Math.min(1,VOL[k]*masterVol); a.play().catch(()=>{}); }
function sndGreat(){ play('great'); }
function sndFail(){ play('fail'); }
function sndAppear(){ play('appear'); }
function sndGood(){ if(muted||masterVol<=0)return; tone(660,0,0.10,'sine',0.22*masterVol); } // good: synthesized soft tone (not provided)

// ---- State ----
let stats={great:0,good:0,miss:0,streak:0,best:0};
let state='idle'; // idle | running | result
let needle=0, zoneStart=0, lastT=0, resolved=false, verdictUntil=0, nextAt=0, flashCol=null;

function deg2can(d){ return (d-90)*Math.PI/180; }

function spawn(){
  needle=0; resolved=false; flashCol=null;
  zoneStart=100+Math.random()*210;
  state='running'; lastT=performance.now();
  document.getElementById('verdict').style.opacity=0;
  sndAppear();
}
function judge(){
  if(resolved||state!=='running')return;
  resolved=true;
  const rel=needle-zoneStart;
  let res = (rel>=0&&rel<=GREAT)?'great' : (rel>0&&rel<=GOOD)?'good' : 'miss';
  applyResult(res);
}
function applyResult(res){
  const v=document.getElementById('verdict');
  if(res==='great'){ stats.great++; stats.streak++; stats.best=Math.max(stats.best,stats.streak);
    v.textContent='GREAT!'; v.className='v-great'; flashCol='#fff'; sndGreat(); }
  else if(res==='good'){ stats.good++; stats.streak=0;
    v.textContent='Good'; v.className='v-good'; flashCol='#9fb0c0'; sndGood(); }
  else { stats.miss++; stats.streak=0;
    v.textContent='MISS'; v.className='v-fail'; flashCol='#c0392b'; sndFail(); }
  v.style.opacity=1;
  const t=performance.now();
  state='result'; verdictUntil=t+650; nextAt=t+2000; // fixed 2s interval
  renderStats();
}
function renderStats(){
  const tot=stats.great+stats.good+stats.miss;
  sGreat.textContent=stats.great; sGood.textContent=stats.good; sMiss.textContent=stats.miss;
  sPct.textContent=tot?Math.round(stats.great/tot*100)+'%':'—';
  sStreak.textContent=stats.streak; sBest.textContent=stats.best;
}

// annular sector with straight edges (DBD style)
function sector(r1,r2,d0,d1,color){
  const a0=deg2can(d0), a1=deg2can(d1);
  ctx.beginPath();
  ctx.arc(C,C,r2,a0,a1);
  ctx.arc(C,C,r1,a1,a0,true);
  ctx.closePath();
  ctx.fillStyle=color; ctx.fill();
}

function draw(now){
  if(state==='running'){
    const dt=(now-lastT)/1000; lastT=now;
    needle += (360/PERIOD)*dt;
    if(needle>=360){ needle=360; if(!resolved) applyResult('miss'); }
  }
  if(state==='result' && now>=nextAt) spawn();
  if(now>verdictUntil && state==='result') document.getElementById('verdict').style.opacity=0;

  ctx.clearRect(0,0,SIZE,SIZE);

  // anneau fin blanc (style DBD)
  ctx.lineCap='butt';
  ctx.lineWidth=2; ctx.strokeStyle='rgba(235,235,238,0.85)';
  ctx.beginPath(); ctx.arc(C,C,R,0,Math.PI*2); ctx.stroke();

  const showCheck = state==='running' || (state==='result' && now<verdictUntil);
  if(showCheck){
    const r1=R-11, r2=R+9;
    // zone Good (blanc translucide, bords droits)
    sector(r1,r2,zoneStart,zoneStart+GOOD,'rgba(235,238,242,0.55)');
    // zone Great (blanc plein lumineux, bords droits)
    ctx.save(); ctx.shadowColor='#fff'; ctx.shadowBlur=9;
    sector(r1,r2,zoneStart,zoneStart+GREAT,'#ffffff');
    ctx.restore();

    // aiguille rouge lumineuse (style DBD)
    const a=deg2can(needle), col=flashCol||'#ff2a2a';
    ctx.save(); ctx.shadowColor=col; ctx.shadowBlur=14;
    ctx.strokeStyle=col; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(C+Math.cos(a)*14, C+Math.sin(a)*14);
    ctx.lineTo(C+Math.cos(a)*(R+8), C+Math.sin(a)*(R+8));
    ctx.stroke();
    ctx.restore();
  } else if(state==='idle'){
    ctx.fillStyle='#55555c'; ctx.font='14px Trebuchet MS'; ctx.textAlign='center';
    ctx.fillText('Press Start', C, C+5);
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ---- Input ----
function hit(){
  if(state==='idle'){ start(); return; }
  if(state==='running'){ if(ac().resume)ac().resume(); judge(); }
}
function start(){ if(ac().resume)ac().resume(); spawn(); }

// ---- Custom key binding ----
let bindKey='Space', rebinding=false;
function keyName(code){
  if(code==='Space')return 'Space';
  if(code.startsWith('Key'))return code.slice(3);
  if(code.startsWith('Digit'))return code.slice(5);
  if(code.startsWith('Numpad'))return 'Numpad '+code.slice(6);
  if(code.startsWith('Arrow'))return {ArrowUp:'↑',ArrowDown:'↓',ArrowLeft:'←',ArrowRight:'→'}[code];
  return {ShiftLeft:'Shift L',ShiftRight:'Shift R',ControlLeft:'Ctrl L',ControlRight:'Ctrl R',
          AltLeft:'Alt',AltRight:'Alt Gr',Enter:'Enter',Tab:'Tab',Backquote:'`'}[code]||code;
}
function refreshKey(){ const n=keyName(bindKey); keyLabel.textContent=n; keyHint.textContent=n; }
const rebindBtn=document.getElementById('rebind');
rebindBtn.onclick=()=>{ rebinding=true; keyLabel.textContent='…press a key'; };

document.addEventListener('keydown',e=>{
  if(rebinding){
    e.preventDefault();
    if(e.code==='Escape'){ rebinding=false; refreshKey(); return; }
    bindKey=e.code; rebinding=false; refreshKey(); return;
  }
  if(e.code===bindKey){ e.preventDefault(); hit(); }
});
cv.addEventListener('pointerdown',e=>{ e.preventDefault(); hit(); });
refreshKey();

document.getElementById('startBtn').onclick=start;
document.getElementById('resetBtn').onclick=()=>{ stats={great:0,good:0,miss:0,streak:0,best:0}; renderStats(); };
document.getElementById('mute').onclick=function(){ muted=!muted; this.textContent=muted?'\u{1F507}':'\u{1F50A}'; };
const volSlider=document.getElementById('vol'), volVal=document.getElementById('volVal');
volSlider.oninput=function(){ masterVol=this.value/100; volVal.textContent=this.value+'%'; if(masterVol>0&&muted){ muted=false; document.getElementById('mute').textContent='\u{1F50A}'; } };
renderStats();
</script>
